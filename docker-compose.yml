version: '3.8'

services:
  # ---------------------------------------------------------
  # BANCO DE DADOS POSTGRESQL
  # ---------------------------------------------------------
  postgres:
    image: postgres:15
    container_name: postgres-ecommerce
    environment:
      - POSTGRES_DB=topicos1db
      - POSTGRES_USER=topicos1
      - POSTGRES_PASSWORD=123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ---------------------------------------------------------
  # SERVIDOR DE AUTENTICAÇÃO KEYCLOAK (OIDC)
  # ---------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: keycloak-ecommerce
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    ports:
      - "8081:8080"
    volumes:
      # Mapeia o arquivo de exportação para que o Keycloak importe o Realm automaticamente ao iniciar
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json
    restart: unless-stopped

volumes:
  postgres_data:
